services:
  mysql:
    image: 'mysql:8.0'
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: '${DB_DATABASE}'
    volumes:
      - 'safedata-mysql:/var/lib/mysql'
    networks:
      - app-network

  redis:
    image: 'redis:alpine'
    ports:
      - '6380:6379'
    volumes:
      - 'safedata-redis:/data'
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  safedata-mysql:
    driver: local
  safedata-redis:
    driver: local
